# fix ssh agent when tmux is detached
# set -g update-environment -r
# setenv -g SSH_AUTH_SOCK $HOME/.ssh/ssh_auth_sock
# configure tmux as a 24-bit terminal
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "xterm-256color"
# set default shell
set -g default-shell /bin/zsh

set -g mouse on

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Fix Home and End keys
bind-key -n Home send Escape "OH"
bind-key -n End send Escape "OF"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

bind -n M-l select-pane -L
bind -n M-h select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Status-position
set-option -g status-position top

# Theme
set -g @catppuccin_flavour 'mocha'

# Plugins
# NOTE: tmux-yank intentionally NOT installed. It hijacks `y` and mouse-drag
# end to call pbcopy/xclip/wl-copy on the *remote* host, which breaks OSC 52
# forwarding to the local Mac clipboard when working over SSH. Native tmux
# `copy-selection-and-cancel` + `set-clipboard on` is the correct path.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'

run '~/.tmux/plugins/tpm/tpm'

# Everything below MUST stay AFTER `run '...tpm/tpm'`: tmux-sensible (loaded
# by TPM) overwrites terminal-overrides and some bindings on startup.

# OSC 52 clipboard passthrough
set -g set-clipboard on
set -ga terminal-overrides ",*:Ms=\\E]52;c;%p2%s\\7"
# Allow DCS passthrough so programs (e.g. Neovim's OSC 52 provider) can send
# raw escape sequences to the outer terminal even if set-clipboard forwarding
# misbehaves with some plugin combinations.
set -g allow-passthrough on

# vi-mode + copy bindings (kept last so nothing overrides them)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# Mouse drag-release copies via OSC 52 (default tmux binding sends the buffer
# to the outer terminal when set-clipboard is on)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
